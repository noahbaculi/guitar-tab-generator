<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM Example</title>
</head>

<body>
    <button id="generateButton">Generate Arrangement</button>
    <pre id="output" style="font-family: monospace; white-space: pre;"></pre>
    <pre id="error" style="color: #b00; font-family: monospace; white-space: pre;"></pre>

    <script type="module">
        import init, { generateArrangements, getTuningNames } from "../pkg/wasm_guitar_tab_generator/guitar_tab_generator.js";

        await init();

        // Smoke check: confirm the typed tuning list reaches JS.
        console.log("Available tunings:", getTuningNames());

        const input_string = `E4
            Eb4
            E4
            Eb4
            E4
            B3
            D4
            C4

            A2A3
            E3
            A3
            C3
            E3
            A3

            E3B3
            E3
            Ab3
            E3
            Ab3
            B3

            A2C4
            E3
            A3
            E3

            E4
            Eb4
            E4
            Eb4
            E4
            B3
            D4
            C4

            A2A3
            E3
            A3
            C3`;

        const tabInput = {
            input: input_string,
            tuningName: "standard",
            guitarNumFrets: 18,
            guitarCapo: 0,
            numArrangements: 1,
            maxFretSpanFilter: null,
        };

        // Hold the previous handle so we can free it before allocating the next one.
        // In TS 5.2+ / runtimes with explicit-resource-management you can write
        // `using set = generateArrangements(tabInput);` and skip the manual free.
        let currentSet = null;

        document.getElementById("generateButton").addEventListener("click", () => {
            const outEl = document.getElementById("output");
            const errEl = document.getElementById("error");
            outEl.textContent = "";
            errEl.textContent = "";

            // Release the previous handle before overwriting the reference. Without this,
            // demo callers leak one ArrangementSet per click on runtimes whose
            // FinalizationRegistry doesn't run promptly.
            if (currentSet !== null) {
                currentSet.free();
                currentSet = null;
            }

            const startTime = performance.now();
            let set;
            try {
                set = generateArrangements(tabInput);
            } catch (err) {
                renderError(err, errEl, input_string);
                return;
            }
            currentSet = set;
            const generateMs = (performance.now() - startTime).toFixed(1);

            const tabs = [];
            for (let i = 0; i < set.len; i++) {
                try {
                    tabs.push(set.render(i, 40, 1, 3));
                } catch (err) {
                    renderError(err, errEl, input_string);
                    return;
                }
            }
            console.log(`Generated ${set.len} arrangement(s) in ${generateMs} ms`);
            outEl.textContent = tabs.join("\n\n---\n\n");

            // Note: set.normalizedInput clones the full beat array across the WASM boundary on every read; cache it into a local before iterating in a tight loop.
            // TODO: render set.normalizedInput once the demo grows a debug pane.
        });

        function renderError(err, errEl, input_string) {
            console.error("TabError:", err);
            if (err && err.kind === "parse") {
                const errored = new Set(err.errors.map((e) => e.line - 1));
                const lines = input_string.split("\n");
                errEl.textContent = lines
                    .map((line, i) => (errored.has(i) ? `> ${line}` : `  ${line}`))
                    .join("\n");
                return;
            }
            errEl.textContent = `${err?.kind ?? "Error"}: ${err?.message ?? err}`;
        }
    </script>
</body>

</html>
